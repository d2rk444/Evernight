<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Evernight</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #04020b;
  }

  body {
    font-family: Arial, sans-serif;
  }

  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 36%, rgba(122, 65, 180, 0.12), transparent 26%),
      radial-gradient(circle at 22% 18%, rgba(255, 92, 176, 0.04), transparent 22%),
      radial-gradient(circle at 80% 72%, rgba(80, 217, 255, 0.04), transparent 22%),
      linear-gradient(180deg, #090420 0%, #05020d 60%, #020106 100%);
  }

  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #bg,
  #obj {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #bg {
    z-index: 1;
  }

  #obj {
    z-index: 2;
  }

  #characterWrap {
    position: absolute;
    left: 50%;
    bottom: -1px;
    transform: translateX(-50%);
    z-index: 6;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  #character {
    position: relative;
    display: block;
    width: auto;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter:
      drop-shadow(0 0 10px rgba(255, 130, 190, 0.12))
      drop-shadow(0 0 22px rgba(116, 68, 220, 0.10));
  }

  #floorGlow {
    position: absolute;
    left: 50%;
    bottom: -34px;
    transform: translateX(-50%);
    width: min(41vw, 410px);
    height: 92px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center,
      rgba(255, 108, 190, 0.12) 0%,
      rgba(110, 72, 220, 0.07) 45%,
      transparent 78%);
    filter: blur(14px);
    z-index: 4;
    pointer-events: none;
  }

  #vignette {
    position: absolute;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.30) 100%);
  }

  @media (max-width: 900px) {
    #floorGlow {
      width: min(64vw, 360px);
    }
  }
</style>
</head>
<body>
<div id="scene">
  <canvas id="bg"></canvas>
  <canvas id="obj"></canvas>

  <div id="floorGlow"></div>

  <div id="characterWrap">
    <canvas id="character" aria-label="personagem animada"></canvas>
  </div>

  <div id="vignette"></div>
</div>

  const frameW = 320;
  const frameH = 293;
  const totalFrames = 10;
  const fps = 10;

  const bg = document.getElementById("bg");
  const obj = document.getElementById("obj");
  const character = document.getElementById("character");

  const bctx = bg.getContext("2d");
  const octx = obj.getContext("2d");
  const cctx = character.getContext("2d");

  const sprite = new Image();
  sprite.src = spriteSrc;

  let w = 0;
  let h = 0;
  let dpr = 1;

  let stars = [];
  let sprites = [];
  let frame = 0;
  let lastFrame = 0;
  let lastSpawn = 0;
  let lastTime = 0;

  const PALETTES = {
    cold: ["#8deeff", "#ffffff", "#73b7ff"],
    pink: ["#ffc4f3", "#ffffff", "#ff73d8"],
    violet: ["#cbb7ff", "#ffffff", "#a36eff"],
    gold: ["#ffe3a3", "#ffffff", "#ffc15a"],
  };

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function irand(min, max) {
    return Math.floor(rand(min, max + 1));
  }

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    for (const cv of [bg, obj]) {
      cv.width = Math.floor(w * dpr);
      cv.height = Math.floor(h * dpr);
      cv.style.width = w + "px";
      cv.style.height = h + "px";
    }

    bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    octx.setTransform(dpr, 0, 0, dpr, 0, 0);

    buildStars();
    setupCharacter();
  }

  function setupCharacter() {
    const targetH = Math.min(h * 0.62, 490);
    const scale = targetH / frameH;
    const cw = Math.round(frameW * scale);
    const ch = Math.round(frameH * scale);

    character.width = Math.floor(cw * dpr);
    character.height = Math.floor(ch * dpr);
    character.style.width = cw + "px";
    character.style.height = ch + "px";

    cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cctx.imageSmoothingEnabled = false;
  }

  function buildStars() {
    const count = Math.max(120, Math.floor((w * h) / 9000));
    stars = [];

    for (let i = 0; i < count; i++) {
      stars.push({
        x: rand(0, w),
        y: rand(0, h),
        size: Math.random() < 0.88 ? 1 : 2,
        alpha: rand(0.10, 0.75),
        phase: rand(0, Math.PI * 2),
        speed: rand(0.006, 0.02),
        color: pick(["#ffffff", "#f7d9ff", "#8feeff", "#b69cff"])
      });
    }
  }

  function px(ctx, x, y, s, color, alpha=1) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), s, s);
  }

  function drawStars(t) {
    bctx.clearRect(0, 0, w, h);

    for (const st of stars) {
      const a = Math.max(0.05, Math.min(0.95, st.alpha + Math.sin(t * st.speed + st.phase) * 0.12));
      px(bctx, st.x, st.y, st.size, st.color, a);
    }

    // pontos de profundidade muito sutis
    for (let i = 0; i < 18; i++) {
      const x = (i * 103 + Math.sin(t * 0.005 + i) * 8) % w;
      const y = 50 + ((i * 61) % Math.max(1, h - 120));
      px(bctx, x, y, 2, "#8b57ff", 0.05);
    }

    bctx.globalAlpha = 1;
  }

  function spawnSprite() {
    const type = pick(["twinkle", "twinkle", "comet", "orbiter", "shard", "dust"]);
    const paletteKey = pick(Object.keys(PALETTES));
    const palette = PALETTES[paletteKey];

    const s = {
      type,
      x: rand(20, w - 20),
      y: rand(24, h * 0.68),
      vx: rand(-0.06, 0.06),
      vy: rand(-0.03, 0.03),
      life: rand(2600, 6200),
      age: 0,
      size: rand(1, 1),
      alpha: rand(0.18, 0.42),
      phase: rand(0, Math.PI * 2),
      wobble: rand(0.0018, 0.0055),
      palette,
      baseColor: palette[0],
      accent: palette[1],
      shadow: palette[2],
      radius: rand(6, 14),
      angle: rand(0, Math.PI * 2),
      spin: rand(0.0015, 0.006)
    };

    if (type === "comet") {
      s.x = rand(-60, w * 0.82);
      s.y = rand(-50, h * 0.32);
      s.vx = rand(0.11, 0.22);
      s.vy = rand(0.07, 0.14);
      s.life = rand(1200, 2200);
      s.alpha = rand(0.32, 0.7);
      s.radius = rand(10, 20);
    }

    if (type === "orbiter") {
      s.radius = rand(6, 16);
      s.spin = rand(0.0015, 0.004);
      s.life = rand(3200, 7200);
      s.alpha = rand(0.18, 0.32);
      s.vx = rand(-0.02, 0.02);
      s.vy = rand(-0.015, 0.015);
    }

    if (type === "shard") {
      s.life = rand(2200, 5200);
      s.vx = rand(-0.035, 0.035);
      s.vy = rand(-0.025, 0.025);
      s.alpha = rand(0.14, 0.30);
    }

    if (type === "dust") {
      s.life = rand(2600, 4600);
      s.alpha = rand(0.10, 0.22);
    }

    sprites.push(s);
    if (sprites.length > 14) sprites.shift();
  }

  function fade(a, life, age) {
    const inA = Math.min(1, age / 500);
    const outA = Math.min(1, (life - age) / 700);
    return Math.max(0, Math.min(inA, outA)) * a;
  }

  function drawTwinkle(s, a, t) {
    const pulse = Math.floor((s.age / 180) % 4);
    const x = Math.round(s.x + Math.sin(t * s.wobble * 70 + s.phase) * 2);
    const y = Math.round(s.y + Math.cos(t * s.wobble * 60 + s.phase) * 2);

    if (pulse === 0) {
      px(octx, x, y, 2, s.accent, a);
    } else if (pulse === 1) {
      px(octx, x, y, 2, s.accent, a);
      px(octx, x - 3, y, 1, s.baseColor, a * 0.8);
      px(octx, x + 3, y, 1, s.baseColor, a * 0.8);
      px(octx, x, y - 3, 1, s.baseColor, a * 0.8);
      px(octx, x, y + 3, 1, s.baseColor, a * 0.8);
    } else if (pulse === 2) {
      px(octx, x, y, 2, s.accent, a);
      px(octx, x - 2, y - 2, 1, "#ffffff", a * 0.7);
      px(octx, x + 2, y + 2, 1, "#ffffff", a * 0.7);
      px(octx, x + 2, y - 2, 1, "#ffffff", a * 0.7);
      px(octx, x - 2, y + 2, 1, "#ffffff", a * 0.7);
    } else {
      px(octx, x, y, 1, "#ffffff", a * 0.8);
    }
  }

  function drawComet(s, a, t) {
    const x = s.x;
    const y = s.y;
    const tail = 5 + Math.floor((Math.sin(t * 0.02 + s.phase) + 1) * 3);

    for (let i = 0; i < tail; i++) {
      px(octx, x - i * 4, y - i * 2.3, 2, s.baseColor, a * (1 - i / (tail + 1)) * 0.75);
    }
    for (let i = 0; i < tail - 1; i++) {
      px(octx, x - i * 4 - 1, y - i * 2.3, 1, "#ffffff", a * (1 - i / (tail + 1)) * 0.4);
    }

    px(octx, x, y, 3, "#ffffff", a);
    px(octx, x - 2, y + 1, 2, s.baseColor, a * 0.95);
  }

  function drawOrbiter(s, a, t) {
    const cx = Math.round(s.x + Math.sin(t * s.wobble * 50 + s.phase) * 3);
    const cy = Math.round(s.y + Math.cos(t * s.wobble * 45 + s.phase) * 2);
    const r = s.radius;
    const ang = s.angle + s.age * s.spin;

    px(octx, cx, cy, 2, s.shadow, a * 0.85);
    px(octx, cx + 1, cy + 1, 1, s.accent, a * 0.75);

    const x1 = cx + Math.cos(ang) * r;
    const y1 = cy + Math.sin(ang) * (r * 0.55);
    const x2 = cx + Math.cos(ang + Math.PI) * (r * 0.7);
    const y2 = cy + Math.sin(ang + Math.PI) * (r * 0.4);

    px(octx, x1, y1, 2, s.baseColor, a);
    px(octx, x2, y2, 1, "#ffffff", a * 0.85);

    // mini orbit ring broken / dotted
    for (let k = 0; k < 6; k++) {
      const segA = ang + k * (Math.PI / 3);
      const ox = cx + Math.cos(segA) * (r * 0.85);
      const oy = cy + Math.sin(segA) * (r * 0.45);
      px(octx, ox, oy, 1, s.shadow, a * 0.35);
    }
  }

  function drawShard(s, a, t) {
    const x = Math.round(s.x + Math.sin(t * s.wobble * 40 + s.phase) * 2);
    const y = Math.round(s.y + Math.cos(t * s.wobble * 35 + s.phase) * 2);

    px(octx, x, y, 2, s.baseColor, a);
    px(octx, x + 2, y - 1, 2, s.baseColor, a * 0.85);
    px(octx, x + 4, y - 2, 1, "#ffffff", a * 0.65);
    px(octx, x - 2, y + 2, 1, s.shadow, a * 0.45);
  }

  function drawDust(s, a, t) {
    const x = Math.round(s.x + Math.sin(t * s.wobble * 55 + s.phase) * 3);
    const y = Math.round(s.y + Math.cos(t * s.wobble * 52 + s.phase) * 2);

    px(octx, x, y, 1, s.baseColor, a);
    px(octx, x + 3, y + 1, 1, s.accent, a * 0.8);
    px(octx, x - 2, y + 2, 1, "#ffffff", a * 0.55);
  }

  function updateSprites(dt, now) {
    octx.clearRect(0, 0, w, h);
    sprites = sprites.filter(s => s.age < s.life);

    for (const s of sprites) {
      s.age += dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;

      const a = fade(s.alpha, s.life, s.age);
      if (a <= 0) continue;

      if (s.type === "twinkle") drawTwinkle(s, a, now);
      else if (s.type === "comet") drawComet(s, a, now);
      else if (s.type === "orbiter") drawOrbiter(s, a, now);
      else if (s.type === "shard") drawShard(s, a, now);
      else if (s.type === "dust") drawDust(s, a, now);
    }
  }

  function drawCharacter(now) {
    if (!sprite.complete) return;

    const cw = character.width / dpr;
    const ch = character.height / dpr;

    if (now - lastFrame > 1000 / fps) {
      frame = (frame + 1) % totalFrames;
      lastFrame = now;
    }

    cctx.clearRect(0, 0, cw, ch);
    cctx.imageSmoothingEnabled = false;
    cctx.drawImage(
      sprite,
      frame * frameW, 0,
      frameW, frameH,
      0, 0,
      cw, ch
    );
  }

  function loop(now) {
    if (!lastTime) lastTime = now;
    const dt = Math.min(33, now - lastTime);
    lastTime = now;

    drawStars(now * 0.06);

    if (now - lastSpawn > rand(700, 1300)) {
      spawnSprite();
      lastSpawn = now;
    }

    updateSprites(dt, now);
    drawCharacter(now);

    requestAnimationFrame(loop);
  }

  let started = false;
  function start() {
    if (started) return;
    started = true;
    resize();

    for (let i = 0; i < 6; i++) {
      setTimeout(spawnSprite, i * 280);
    }

    requestAnimationFrame(loop);
  }

  sprite.onload = start;
  if (sprite.complete) start();

  window.addEventListener("resize", resize);
})();
